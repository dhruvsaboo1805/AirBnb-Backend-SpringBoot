
  name: CI Pipeline

  on:
    pull_request:
      branches: [ master ]

    push:
      branches: [ master ]

  jobs:

    test:
      name: Build, Test & Publish Package
      runs-on: ubuntu-latest

      services:

        mysql:
          image: mysql:8.0
          env:
            MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
            MYSQL_DATABASE: ${{ secrets.DB_NAME }}
          ports:
            - 3306:3306

        redis:
          image: redis:7
          ports:
            - 6379:6379

      steps:

        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Setup Java 21
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: 21

        - name: Cache Gradle Dependencies
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

        - name: Grant Execute Permission
          run: chmod +x gradlew

        - name: Run Tests
          env:
            SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/${{ secrets.DB_NAME }}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
            SPRING_DATA_REDIS_HOST: localhost
            SPRING_DATA_REDIS_PORT: 6379
            SAGA_QUEUE_VALUE: ${{ secrets.SAGA_QUEUE_VALUE }}
            LOCK_KEY_PREFIX: ${{ secrets.LOCK_KEY_PREFIX }}
            LOCK_TIME_OUT_DURATION: ${{ secrets.LOCK_TIME_OUT_DURATION }}
          run: |
            ./gradlew clean test jacocoTestReport

        - name: Upload JaCoCo Report
          uses: actions/upload-artifact@v4
          with:
            name: jacoco-report
            path: build/reports/jacoco/

        - name: Build Application
          run: |
            ./gradlew clean build -x test

        - name: Publish GitHub Package
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GITHUB_ACTOR: ${{ github.actor }}
            GITHUB_REPOSITORY: ${{ github.repository }}
            BUILD_NUMBER: ${{ github.run_number }}
            GIT_COMMIT: ${{ github.sha }}
            GIT_BRANCH: ${{ github.ref_name }}
          run: |
            ./gradlew publish

        - name: Upload JAR Artifact
          uses: actions/upload-artifact@v4
          with:
            name: airbnb-backend-jar
            path: build/libs/*[^plain].jar
