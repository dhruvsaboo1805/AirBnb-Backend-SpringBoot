name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build and Run Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SAGA_QUEUE_VALUE: ${{ secrets.SAGA_QUEUE_VALUE }}
          LOCK_KEY_PREFIX: ${{ secrets.LOCK_KEY_PREFIX }}
          LOCK_TIME_OUT_DURATION: ${{ secrets.LOCK_TIME_OUT_DURATION }}
        run: ./gradlew build

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          if-no-files-found: ignore

      - name: Print build summary
        if: always()
        run: |
          echo "========================================="
          echo "Branch   : ${{ github.ref }}"
          echo "Actor    : ${{ github.actor }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Message  : ${{ github.event.head_commit.message }}"
          echo "Status   : ${{ job.status }}"
          echo "========================================="

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Build FAILED on branch ${{ github.ref }}"
          echo "::error::Triggered by ${{ github.actor }} - ${{ github.event.head_commit.message }}"




